repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=5000"]
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        files: ^backend/

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: ^frontend/src/
        types_or: [javascript, jsx, css, json]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  - repo: https://github.com/pypa/pip-audit
    rev: v2.7.3
    hooks:
      - id: pip-audit
        args:
          - "-r"
          - "requirements.txt"
          - "--ignore-vuln=ECHO-f04c-582a-df62"
          - "--ignore-vuln=ECHO-37cc-2ae7-e3c8"
          - "--ignore-vuln=ECHO-879a-fe35-cf61"
          - "--ignore-vuln=ECHO-7627-a361-b4d3"
          - "--ignore-vuln=ECHO-1dc5-af13-00c1"
          - "--ignore-vuln=ECHO-5818-1fba-950a"
          - "--ignore-vuln=ECHO-de02-7575-4370"
          - "--ignore-vuln=ECHO-f4ca-f938-4210"
          - "--ignore-vuln=ECHO-01ac-8821-274a"

  - repo: local
    hooks:
      - id: npm-audit
        name: npm audit
        language: system
        entry: bash -c "cd frontend && npm audit --audit-level=high"
        pass_filenames: false
        files: ^frontend/package.*\.json$

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        files: ^frontend/src/.*\.[jt]sx?$
        args: ["--fix"]
        additional_dependencies:
          - eslint@8.57.0
          - eslint-config-react-app@7.0.1
          - eslint-plugin-react@7.37.5
          - eslint-plugin-react-hooks@4.6.2
          - eslint-plugin-jsx-a11y@6.10.2
          - eslint-plugin-import@2.31.0
